name: Automated Update

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: Srtipe

      # Add your automated update steps here.
      # Any file modifications made in steps above will be picked up
      # by create-pull-request and committed to a new branch.

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: automated update"
          title: "chore: automated update"
          body: "Automated changes created by GitHub Actions (Option A: PR instead of direct push to `Srtipe`)."
          base: Srtipe
          branch: ci/automated-update
          delete-branch: true

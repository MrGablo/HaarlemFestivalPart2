version: "3.8"

services:
  nginx:
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./app:/app
      - ./certs/aiven-ca.pem:/etc/ssl/certs/aiven-ca.pem:ro

  php:
    build:
      context: .
      dockerfile: PHP.Dockerfile
    volumes:
      - ./app:/app
      - ./.env:/app/.env:ro
      - ./ca.pem:/etc/ssl/certs/aiven-ca.pem:ro
    env_file:
      - .env
    environment:
      # Your app will read these:
      DB_SSL_CA: /etc/ssl/certs/aiven-ca.pem

  phpmyadmin:
    image: phpmyadmin:latest
    ports:
      - "8080:80"
    env_file:
      - .env
    environment:
      # phpMyAdmin expects PMA_* variables.
      # We map them from the AIVEN_* variables INSIDE the container using explicit values
      # by just reusing them directly (same values are available thanks to env_file).
      PMA_HOST: ${AIVEN_HOST}
      PMA_PORT: ${AIVEN_PORT}
      PMA_USER: ${AIVEN_USER}
      PMA_PASSWORD: ${AIVEN_PASSWORD}
      PMA_SSL: "true"
      PMA_SSL_CA: /etc/ssl/certs/aiven-ca.pem
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USERNAME: ${SMTP_USERNAME}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      SMTP_ENCRYPTION: ${SMTP_ENCRYPTION}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_PUBLISHABLE_KEY: ${STRIPE_PUBLISHABLE_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
    volumes:
      - ./ca.pem:/etc/ssl/certs/aiven-ca.pem:ro
    restart: unless-stopped